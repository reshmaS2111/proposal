<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Sundaresan ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
overflow:hidden;
background:black;
color:white;
height:100vh;
}

#bgVideo{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

.overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,.45);
z-index:-1;
}

.container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

h1{
font-size:70px;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{
text-shadow:0 0 10px pink;
}
to{
text-shadow:0 0 40px red,
0 0 70px hotpink;
}
}

.subtitle{
margin-top:20px;
font-size:25px;
}

.btn{
padding:15px 35px;
margin:20px;
border:none;
border-radius:40px;
font-size:20px;
cursor:pointer;
transition:.3s;
}

.start{
background:#ff1493;
color:white;
}

.start:hover{
transform:scale(1.1);
}

.no{
background:white;
color:black;
position:absolute;
top:65%;
left:55%;
}

.heart{
position:absolute;
font-size:30px;
animation:fall linear forwards;
}

@keyframes fall{
0%{
transform:translateY(-100px);
opacity:1;
}
100%{
transform:translateY(110vh);
opacity:0;
}
}

.butterfly{
position:absolute;
font-size:40px;
animation:fly 15s linear infinite;
}

@keyframes fly{
0%{
left:-100px;
top:20%;
}

100%{
left:110%;
top:70%;
}
}

.loveCounter{
position:absolute;
bottom:20px;
width:100%;
text-align:center;
font-size:22px;
}

</style>
</head>

<body>

<video autoplay muted loop id="bgVideo">
<source src="marumagal.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<audio id="bgMusic" loop>
<source src="munbe.mp3.mp3" type="audio/mpeg">
</audio>

<div class="container">

<h1>❤️ Sundaresan ❤️</h1>

<p class="subtitle">
Every Love Story Is Beautiful,<br>
But Ours Is My Favorite ❤️
</p>

<button class="btn start"
onclick="window.location='timeline.html'">
Begin Our Journey ❤️
</button>

<button class="btn no" id="noBtn">
NO 😢
</button>

</div>

<div class="loveCounter">
💕 Made With Love By Reshma 💕
</div>

<script>

const noBtn=document.getElementById("noBtn");

noBtn.addEventListener("mouseover",()=>{

let x=Math.random()*80;
let y=Math.random()*80;

noBtn.style.left=x+"%";
noBtn.style.top=y+"%";

});

function createHeart(){

const heart=document.createElement("div");

heart.classList.add("heart");

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=
(Math.random()*5+3)+"s";

heart.style.fontSize=
(Math.random()*30+20)+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},8000);

}

setInterval(createHeart,250);

function createButterfly(){

const butterfly=document.createElement("div");

butterfly.classList.add("butterfly");

butterfly.innerHTML="🦋";

butterfly.style.top=
Math.random()*80+"%";

butterfly.style.animationDuration=
(Math.random()*10+8)+"s";

document.body.appendChild(butterfly);

setTimeout(()=>{
butterfly.remove();
},18000);

}

setInterval(createButterfly,3000);

document.addEventListener("click", function() {
document.getElementById("bgMusic").play();
}, { once: true });

</script>

</body>
</html>
