<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ Love Quiz ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
color:white;
overflow:hidden;
text-align:center;
}

#bgVideo{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.45);
z-index:-1;
}

.quiz-box{
width:90%;
max-width:700px;
margin:80px auto;
background:rgba(255,255,255,.15);
backdrop-filter:blur(12px);
padding:30px;
border-radius:25px;
box-shadow:0 0 30px rgba(255,255,255,.4);
}

h1{
margin-bottom:20px;
font-size:50px;
}

#question{
font-size:28px;
margin-bottom:20px;
}

.option{
display:block;
width:100%;
padding:15px;
margin:10px 0;
border:none;
border-radius:30px;
font-size:18px;
cursor:pointer;
background:#ff1493;
color:white;
}

.option:hover{
transform:scale(1.03);
}

#result{
margin-top:20px;
font-size:28px;
font-weight:bold;
}

.nextBtn{
display:none;
margin:30px auto;
padding:15px 35px;
border:none;
border-radius:40px;
background:#ff1493;
color:white;
font-size:22px;
cursor:pointer;
}

.floating{
position:fixed;
font-size:30px;
animation:fall linear forwards;
pointer-events:none;
}

@keyframes fall{
0%{
transform:translateY(-100px);
opacity:1;
}
100%{
transform:translateY(110vh);
opacity:0;
}
}
</style>
</head>

<body>

<video autoplay muted loop id="bgVideo">
<source src="sss.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<audio id="bgMusic" loop>
<source src="munbe_vaa_cover.mp3" type="audio/mpeg">
</audio>

<div class="quiz-box">

<h1>❤️ Love Quiz ❤️</h1>

<h2 id="question"></h2>

<div id="answers"></div>

<div id="result"></div>

<button class="nextBtn"
id="nextBtn"
onclick="window.location='hearts-game.html'">
❤️ Continue To Next Surprise ❤️
</button>

</div>

<script>

document.addEventListener("click", function() {
document.getElementById("bgMusic").play();
}, { once: true });

const quiz = [

{
q:"💕 Who is the most special person?",
a:[
"Everyone",
"Reshma ❤️",
"Neighbour",
"Teacher"
],
correct:1
},

{
q:"🌹 Which memory is the most beautiful?",
a:[
"Random day",
"Boring day",
"Moments spent together ❤️",
"Sleeping"
],
correct:2
},

{
q:"💋 Who owns a special place in my heart?",
a:[
"Nobody",
"Reshma ❤️",
"Google",
"Bus Driver"
],
correct:1
}

];

let current=0;
let score=0;

const question=document.getElementById("question");
const answers=document.getElementById("answers");
const result=document.getElementById("result");

function loadQuestion(){

question.innerHTML=quiz[current].q;

answers.innerHTML="";

quiz[current].a.forEach((ans,index)=>{

const btn=document.createElement("button");

btn.className="option";

btn.innerHTML=ans;

btn.onclick=()=>checkAnswer(index);

answers.appendChild(btn);

});

}

function checkAnswer(index){

if(index===quiz[current].correct){
score++;
}

current++;

if(current<quiz.length){
loadQuestion();
}
else{
showResult();
}

}

function showResult(){

question.innerHTML="❤️ Quiz Completed ❤️";

answers.innerHTML="";

result.innerHTML=
"🏆 Your Score: "+score+"/"+quiz.length+" ❤️";

document.getElementById("nextBtn").style.display="block";

}

loadQuestion();

setInterval(() => {

const item=document.createElement("div");

const emojis=[
"❤️","💋","😘","💕","🌹","✨"
];

item.innerHTML=
emojis[Math.floor(Math.random()*emojis.length)];

item.classList.add("floating");

item.style.left=
Math.random()*100+"vw";

item.style.fontSize=
(Math.random()*25+20)+"px";

item.style.animationDuration=
(Math.random()*5+4)+"s";

document.body.appendChild(item);

setTimeout(()=>{
item.remove();
},9000);

},250);

</script>

</body>
</html>
